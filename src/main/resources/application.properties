spring.application.name=demo1

#使用 mysql-connector-j 驱动包让 Java 程序和 MySQL 通信
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/demo1?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=12345

# ========== 2. MyBatis-Plus 配置 ==========
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 全局配置：主键策略（雪花算法）& 逻辑删除
mybatis-plus.global-config.db-config.id-type=assign_id
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.global-config.db-config.logic-delete-value=1


# Mapper XML文件位置
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
# 实体类所在包（改成你自己的实体类包路径）
mybatis-plus.type-aliases-package=com.example.demo1.entity